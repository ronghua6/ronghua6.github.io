* {

:root {

body {

  overflow-x: hidden;

.user-info {

}
.user-avatar {

}

}
.user-name {

}
.container {

  align-items: center;
  justify-content: center;
  padding: 80px 20px 20px;
  position: relative;
  z-index: 2;
}
.main-card {

  overflow: hidden;

  border: 1px solid rgba(255, 255, 255, 0.6);
}
.sidebar {

}
.sidebar-header {

}
.sidebar-header img {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  margin-bottom: 8px;
  border: 2px solid var(--accent);
}
.nav-list {
  list-style: none;
}
.nav-item {
  padding: 12px 20px;
  font-size: 14px;
  color: var(--text-main);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 10px;
}
.nav-item:hover {
  background: rgba(116, 185, 255, 0.1);
  color: var(--accent);
}
.nav-item.active {
  background: rgba(116, 185, 255, 0.15);
  color: var(--accent);
}
/* 右侧内容区域（多页面切换） */
.content-area {
  flex: 1;
  padding: 30px;
  position: relative;
  background: #fff;
  color: #333;
}
/* 页面公共样式 */
.page {
  display: none;
}
.page.active {

}
.page h2 {
  font-size: 24px;
  margin-bottom: 15px;
  color: var(--accent);
}
.page p {
  line-height: 1.7;
  margin-bottom: 10px;
  font-size: 15px;
}
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: rgba(0, 0, 0, 0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.modal.show {
  display: flex;
}
.modal-content {
  background: white;
  border-radius: 12px;
  padding: 25px;
  width: 90%;
  max-width: 320px;
  color: var(--text-main);
}
.modal-content h3 {
  margin-bottom: 20px;
  color: var(--accent);
}
.modal-content label {
  display: block;
  margin: 10px 0 5px;
  font-size: 14px;
}
.modal-content input {
  width: 100%;
  padding: 8px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-size: 14px;
}
.modal-btn {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  background: var(--accent);
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}
.modal-btn.gray {
  background: #ddd;
  color: #333;
}
</style>

<script>

document.addEventListener('DOMContentLoaded', function() {
  const bgm = document.getElementById('bgm');
  document.addEventListener('click', function() {
    bgm.muted = false;
  }, { once: true });
});


const canvas = document.getElementById('rain');
const ctx = canvas.getContext('2d');
let w = window.innerWidth;
let h = window.innerHeight;
canvas.width = w;
canvas.height = h;
let drops = [];
class RainDrop {
  constructor() {
    this.x = Math.random() * w;
    this.y = Math.random() * -h;
    this.speed = Math.random() * 5 + 5;
    this.len = Math.random() * 10 + 5;
    this.opacity = Math.random() * 0.5 + 0.2;
  }
  fall() {
    this.y += this.speed;
    if (this.y > h) this.y = -20;
  }
  draw() {
    ctx.beginPath();
    ctx.strokeStyle = `rgba(116, 185, 255, ${this.opacity})`;
    ctx.lineWidth = 1;
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(this.x, this.y + this.len);
    ctx.stroke();
  }
}
for (let i = 0; i < 80; i++) drops.push(new RainDrop());
function rain() {
  ctx.clearRect(0, 0, w, h);
  drops.forEach(d => { d.fall(); d.draw(); });
  requestAnimationFrame(rain);
}
rain();
window.addEventListener('resize', () => {
  w = window.innerWidth;
  h = window.innerHeight;
  canvas.width = w;
  canvas.height = h;
});

const navItems = document.querySelectorAll('.nav-item');
const pages = document.querySelectorAll('.page');
navItems.forEach(item => {
  item.addEventListener('click', () => {
    navItems.forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    const pageId = 'page-' + item.dataset.page;
    pages.forEach(p => p.classList.remove('active'));
    const targetPage =.getElementById(pageId);
    if (targetPage) targetPage.classList.add('active');
  });
});

document.getElementById('openUserModal').onclick = () => {
  document.getElementById('userModal').classList.add('show');
};
document.getElementById('closeModal').onclick = () => {
  document.getElementById('userModal').classList.remove('show');
};
document.getElementById('saveInfo').onclick = () => {
  let avatar = document.getElementById('avatarInput').value;
  let name = document.getElementById('nameInput').value;
  if (avatar) {
    document.getElementById('topAvatar').innerHTML = `<img src="${avatar}" alt="avatar">`;
    document.getElementById('sidebarAvatar').src = avatar;
  }
  if (name) {
    document.getElementById('topName').textContent = name;
    document.getElementById('sidebarName').textContent = name;
  }
  document.getElementById('userModal').classList.remove('show');
};
</script>
